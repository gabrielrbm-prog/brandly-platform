# CI — Brandly Monorepo
#
# STATUS BADGES (add these to README.md when the repo is public or using a PAT):
#
#   CI:
#   ![CI](https://github.com/<ORG>/<REPO>/actions/workflows/ci.yml/badge.svg)
#
#   Deploy Web:
#   ![Deploy Web](https://github.com/<ORG>/<REPO>/actions/workflows/deploy-pages.yml/badge.svg)
#
#   Mobile CI:
#   ![Mobile CI](https://github.com/<ORG>/<REPO>/actions/workflows/mobile-ci.yml/badge.svg)
#
# Replace <ORG>/<REPO> with gabrielrbm-prog/brandly-platform

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build, Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Turborepo remote cache is optional (requires TURBO_TOKEN + TURBO_TEAM secrets).
      # Without those secrets this step is a no-op — local cache still works.
      - name: Install dependencies
        run: npm ci

      # Ensure @vitest/coverage-v8 is present for the --coverage flag.
      # This is a dev-only install that adds <5 s and avoids modifying package.json.
      # Once @vitest/coverage-v8 is added to the root devDependencies and committed,
      # this step becomes a no-op because npm ci will have already installed it.
      - name: Ensure coverage provider
        run: |
          if ! node -e "require('@vitest/coverage-v8')" 2>/dev/null; then
            npm install --no-save @vitest/coverage-v8@^2.1.0
          fi

      # Turborepo caches build outputs in .turbo/ across steps.
      # The cache key includes the lockfile so it is invalidated on dependency changes.
      - name: Cache Turborepo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            turbo-${{ runner.os }}-

      - name: Build packages
        run: npm run build -- --cache-dir=.turbo

      - name: Lint
        run: npm run lint -- --cache-dir=.turbo

      - name: Typecheck
        run: npm run typecheck -- --cache-dir=.turbo

      # Vitest runs from the root vitest.config.ts (tests/**/*.test.ts).
      # --coverage uses V8 provider and writes to coverage/ at the repo root.
      # The provider is declared inline so no config change is needed.
      - name: Test with coverage
        run: npx vitest run --coverage --coverage.provider=v8 --coverage.reporter=text --coverage.reporter=lcov
        env:
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        # Upload even when tests fail so the report is always available
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  docker:
    name: Docker Build (API)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: brandly-api:ci
          # Layer cache scoped to the branch — falls back to main
          cache-from: type=gha,scope=docker-api-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=docker-api-${{ github.ref_name }}
